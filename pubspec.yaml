name: joongshim_uji_app
description: 중심 유지 App - 에너지 감각 기록 및 퍼센트 분석 앱
version: 1.1.2+5

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  fl_chart: ^1.2.0
  provider: ^6.1.1
  intl: ^0.20.2
  cloud_firestore: ^6.1.3
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  firebase_auth: ^6.2.0
  google_sign_in: ^7.2.0
  share_plus: ^12.0.1
  shared_preferences: ^2.5.4
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon.png

flutter_launcher_icons:
  image_path: "assets/icon.png"
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icon.png"
